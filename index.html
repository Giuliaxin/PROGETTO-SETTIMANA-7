<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportsHub — Eventi sportivi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
  </head>
  <body>

    <header class="site-header text-white text-center py-4">
      <div class="container">
        <h1 class="display-5 fw-bold m-0 mb-2">SportsHub</h1>
        <p class="lead small mb-4">Cerca una squadra, scopri prossime partite e ultimi risultati.</p>
        <form id="search-form" class="row g-2 justify-content-center mx-auto" style="max-width: 500px;">
          <div class="col">
            <input type="text" id="search-input" class="form-control form-control-lg" placeholder="es. Arsenal, Lakers, Real Madrid" required>
          </div>
          <div class="col-auto">
            <button type="submit" class="btn btn-light btn-lg fw-bold px-4">Cerca</button>
          </div>
        </form>
      </div>
    </header>

    <main class="container my-4">

      <section id="preferiti-section" class="mb-5">
        <h2 class="h4 pb-2 mb-3 border-bottom fw-bold d-flex align-items-center">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="text-warning me-2" viewBox="0 0 16 16">
            <path d="M3.612 15.443c-.386.198-.824-.149-.746-.592l.83-4.73L.173 6.765c-.329-.314-.158-.888.283-.95l4.898-.696L7.538.792c.197-.39.73-.39.927 0l2.184 4.327 4.898.696c.441.062.612.636.282.95l-3.522 3.356.83 4.73c.078.443-.36.79-.746.592L8 13.187l-4.389 2.256z"/>
          </svg>
          Le tue squadre preferite
        </h2>
        <div id="preferiti-lista" class="row g-3"></div>
      </section>

      <section id="risultati-section" class="mb-5">
        <h2 class="h4 pb-2 mb-3 border-bottom fw-bold">Squadre trovate</h2>
        <div id="loading-spinner" class="d-none text-center my-4">
          <div class="spinner-border" role="status"></div>
        </div>
        <div id="error-message" class="alert d-none fw-bold" role="alert">Si è verificato un errore, riprova.</div>
        <div id="search-results-list" class="row g-3">
          <p class="text-muted fst-italic placeholder-text">Inizia cercando una squadra qui sopra.</p>
        </div>
      </section>

      <section id="dettagli-section" class="d-none">
        <h2 id="dettagli-nome-squadra" class="h3 pb-2 mb-4 border-bottom fw-bold text-center text-md-start"></h2>
        <div class="row g-4">
          <div class="col-12 col-md-6">
            <div class="bg-white p-4 rounded shadow-sm h-100">
              <h3 class="h5 pb-2 mb-3 border-bottom fw-bold">Prossimi eventi</h3>
              <div id="prossimi-eventi-lista"></div>
            </div>
          </div>
          <div class="col-12 col-md-6">
            <div class="bg-white p-4 rounded shadow-sm h-100">
              <h3 class="h5 pb-2 mb-3 border-bottom fw-bold">Ultimi risultati</h3>
              <div id="ultimi-risultati-lista"></div>
            </div>
          </div>
        </div>
      </section>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/script.js"></script>
  </body>
</html>
